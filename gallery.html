<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleaning Gallery — TurnCo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-lg mx-auto px-4 py-8">

    <!-- Header -->
    <div class="flex items-center gap-2 mb-6">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 11a8 8 0 1 0 .5 4M20 7v4.5L16 13"/>
        </svg>
      </div>
      <span class="text-xl font-bold text-gray-900">TurnCo</span>
    </div>

    <div id="content">
      <!-- Loading -->
      <div class="text-center py-16">
        <svg class="animate-spin w-8 h-8 text-blue-600 mx-auto" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://mcbnmsbinjvpqtszvkvj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_q2wvjcEbs-BhWMzzjVL9zw_d0mUFam8';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const cleaningId = params.get('id');

      if (!cleaningId) {
        showError('No cleaning ID provided.');
        return;
      }

      const [cleaningRes, photosRes] = await Promise.all([
        db.from('cleanings')
          .select('*, properties(name, address), cleaners(name)')
          .eq('id', cleaningId)
          .single(),
        db.from('cleaning_photos')
          .select('*')
          .eq('cleaning_id', cleaningId)
          .order('uploaded_at', { ascending: true }),
      ]);

      if (cleaningRes.error || !cleaningRes.data) {
        showError('Cleaning not found.');
        return;
      }

      const c = cleaningRes.data;
      const photos = photosRes.data || [];

      const dateObj = new Date(c.cleaning_date + 'T12:00:00');
      const displayDate = dateObj.toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
      });

      document.getElementById('content').innerHTML = `
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 mb-5">
          <h1 class="text-xl font-bold text-gray-900 mb-1">${escapeHtml(c.properties?.name || 'Property')}</h1>
          ${c.properties?.address ? `<p class="text-sm text-gray-500 mb-1">📍 ${escapeHtml(c.properties.address)}</p>` : ''}
          <p class="text-sm text-gray-600">📅 ${displayDate}</p>
          ${c.cleaners?.name ? `<p class="text-sm text-gray-500 mt-1">Cleaned by: <strong>${escapeHtml(c.cleaners.name)}</strong></p>` : ''}
          <span class="inline-block mt-2 text-xs font-semibold px-2.5 py-1 rounded-full bg-green-50 text-green-700">Completed</span>
        </div>

        ${photos.length === 0 ? `
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 text-center">
            <p class="text-gray-400 text-sm">No photos were uploaded for this cleaning.</p>
          </div>
        ` : `
          <h2 class="text-base font-bold text-gray-700 mb-3">${photos.length} Photo${photos.length !== 1 ? 's' : ''}</h2>
          <div class="grid grid-cols-2 gap-2">
            ${photos.map(p => `
              <a href="${p.url}" target="_blank" rel="noopener" class="block aspect-square rounded-xl overflow-hidden bg-gray-100">
                <img src="${p.url}" alt="Cleaning photo" class="w-full h-full object-cover hover:opacity-90 transition-opacity" loading="lazy" />
              </a>
            `).join('')}
          </div>
        `}

        <p class="text-xs text-gray-400 text-center mt-8">Powered by TurnCo</p>
      `;
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="text-center py-16">
          <p class="text-gray-500">${msg}</p>
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    init();
  </script>
</body>
</html>
